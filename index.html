<html>
<head>

        }
    </style>
</head>
<body>

<div class="box">
    <h3>🛒 Простая отправка</h3>
    <p>Нажми на кнопку ниже. Мы убрали весь JavaScript, чтобы не было ошибок.</p>
    
    <!-- Это просто ссылка, оформленная как кнопка -->
    <a href="https://whatsapp.com." 
       class="btn" 
       target="_blank">
        ОТПРАВИТЬ В WHATSAPP
    </a>
</div>

</body>
</html>
